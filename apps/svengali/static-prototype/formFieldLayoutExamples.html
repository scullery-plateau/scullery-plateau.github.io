<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svengali Form Field Layout Examples</title>
    
    <!-- Bootstrap 5.0.2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6.0.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caudex:wght@400;700&family=Modern+Antiqua&display=swap" rel="stylesheet">
    
    <!-- Project Stylesheets -->
    <link rel="stylesheet" href="../../../style/rpg.css">
    <link rel="stylesheet" href="../../../style/font.css">
    <link rel="stylesheet" href="../../../style/menu.css">
  </head>
  <body class="bg-dark text-light">
    <div class="container-fluid">
      <h1>Form Field Layout Examples</h1>
      <div class="rpg-box">
        <h2>Layer Select</h2>
        <div class="row">
          <div class="col-6">
            <!-- Example start-->
            <div class="d-flex align-items-center">
              <div class="p-2">
                <label for="layers" class="col-form-label">Layer:</label>
              </div>
              <div class="flex-fill p-2">
                <select id="layers" class="form-select">
                  <!-- sample layers here -->
                  <option value="layer1">Layer 1</option>
                  <option value="layer2">Layer 2</option>
                </select>
              </div>
            </div>
            <!-- Example end-->
          </div>
        </div>
        <h2>Row / Column Select</h2>
        <div class="row">
          <div class="col-6">
            <!-- Example start-->
            <div class="d-flex align-items-center">
              <div class="p-2">
                <label for="rows" class="col-form-label">Row:</label>
              </div>
              <div class="flex-fill p-2">
                <select id="rows" class="form-select">
                  <!-- sample rows here -->
                  <option value="row1">Row 1</option>
                  <option value="row2">Row 2</option>
                </select>
              </div>
              <div class="p-2">
                <button class="btn btn-sm btn-success" title="Add Row" alt="Add Row">
                  <i class="fas fa-plus"></i>
                </button>
              </div>
              <div class="p-2">
                <button class="btn btn-sm btn-danger" title="Delete Row" alt="Delete Row">
                  <i class="fas fa-minus"></i>
                </button>
              </div>
            </div>
            <!-- Example end-->
          </div>
        </div>
        <div class="row">
          <div class="col-6">
            <!-- Example start-->
            <div class="d-flex align-items-center">
              <div class="p-2">
                <label for="columns" class="col-form-label">Column:</label>
              </div>
              <div class="flex-fill p-2">
                <select id="columns" class="form-select">
                  <!-- sample columns here -->
                  <option value="column1">Column 1</option>
                  <option value="column2">Column 2</option>
                </select>
              </div>
              <div class="p-2">
                <button class="btn btn-sm btn-success" title="Add Column" alt="Add Column">
                  <i class="fas fa-plus"></i>
                </button>
              </div>
              <div class="p-2">
                <button class="btn btn-sm btn-danger" title="Delete Column" alt="Delete Column">
                  <i class="fas fa-minus"></i>
                </button>
              </div>
            </div>
            <!-- Example end-->
          </div>
        </div>
        <h2>Column Name:</h2>
        <div class="row">
          <div class="col-6">
            <!-- Example start-->
            <div class="d-flex align-items-center">
              <div class="p-2">
                <label for="columnName" class="col-form-label">Column&nbsp;Name:</label>
              </div>
              <div class="flex-fill p-2">
                <input type="text" id="columnName" class="form-control" value="Full Name">
              </div>
              <div class="p-2">
                <span id="columnId" class="form-text text-info">FULL_NAME</span>
              </div>
            </div>
            <!-- Example end-->
          </div>
        </div>
        <h2>Text:</h2>
        <div class="row">
          <div class="col-6">
            <!-- Example start-->
            <div class="d-flex align-items-center">
              <div class="p-2">
                <label for="{FieldId}" class="col-form-label">{Field&nbsp;Name}:</label>
              </div>
              <div class="flex-fill p-2">
                <input type="text" id="{FieldId}" class="form-control" value="Full Name">
              </div>
            </div>
            <!-- Example end-->
          </div>
        </div>
        <h2>Number:</h2>
        <div class="row">
          <div class="col-6">
            <!-- Example start-->
            <div class="d-flex align-items-center">
              <div class="p-2">
                <label for="{FieldId}" class="col-form-label">{Field&nbsp;Number}:</label>
              </div>
              <div class="flex-fill p-2">
                <input type="number" id="{FieldId}" class="form-control" value="0">
              </div>
            </div>
            <!-- Example end-->
          </div>
        </div>
        <h2>Dropdown (Options, Font, Image):</h2>
        <div class="row">
          <div class="col-6">
            <!-- Example start-->
            <div class="d-flex align-items-center">
              <div class="p-2">
                <label for="{FieldId}" class="col-form-label">{Field&nbsp;Name}:</label>
              </div>
              <div class="flex-fill p-2">
                <select id="{FieldId}" class="form-select">
                  <!-- sample layers here -->
                  <option value="layer1">Layer 1</option>
                  <option value="layer2">Layer 2</option>
                </select>
              </div>
            </div>
            <!-- Example end-->
          </div>
        </div>
        <h2>Color</h2>
        <div class="row">
          <div class="col-6">
            <!-- Example start-->
            <div class="justify-content-center">
              <button class="btn btn-secondary w-100" style="background-color: #333; color: #ddd">{Field&nbsp;Name}</button>
              <!-- background color will be the selected color, foreground color will be calculated per `Colors.getForegroundColor` from `common/colors.js` for contrast -->
            </div>
            <!-- Example end-->
          </div>
        </div>
        <h2>Text Area:</h2>
        <div class="row">
          <div class="col-6">
            <!-- Example start-->
            <div class="form-floating">
              <textarea class="form-control" placeholder="Leave a comment here" id="{fieldId}" style="height: 100px"></textarea>
              <label for="{fieldId}" class="text-dark">{Field&nbsp;Name}</label>
            </div>
            <!-- Example end-->
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
