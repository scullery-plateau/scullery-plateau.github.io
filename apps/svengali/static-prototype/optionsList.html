<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Columns Section Prototype</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body>
    <div class="rpg-box my-3 p-3">
      <div class="row">
        <div class="col-md-6">
          <!-- Options List -->
          <label class="form-label">Options</label>
          <div class="p-2">
            <ol>
              <li class="d-flex justify-content-center mb-2">
                <input type="text" id="option-0" class="form-control" value="Option 1"/>
                <button class="btn btn-sm btn-outline-danger ms-2"><i class="fa fa-xmark"></i></button>
              </li>
              <li class="d-flex justify-content-center mb-2">
                <input type="text" id="option-1" class="form-control" value="Option 2"/>
                <button class="btn btn-sm btn-outline-danger ms-2"><i class="fa fa-xmark"></i></button>
              </li>
              <li class="d-flex justify-content-center mb-2">
                <button class="btn btn-sm btn-outline-primary">Add Option</button>
              </li>
            </ol>
          </div>
          <!-- End Options List -->
        </div>
      </div>
    </div>
  </body>
</html>
